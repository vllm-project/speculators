name: Development

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  UV_TORCH_BACKEND: "auto"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.13"]
    env:
      UV_SYSTEM_PYTHON: 1
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv pip install .[dev]
      - name: Run quality checks
        run: make quality


  unit-tests:
    runs-on: ibm-wdc-k8s-vllm-h100-solo
    strategy:
      matrix:
        python: ["3.10", "3.13"]
        transformers: ["<5.0.0", ""]
        exclude:                                                                                                                                                                                                                                                                        
            - python: "3.13"                                                                                                                                                                                                                                                              
              transformers: "<5.0.0"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install dependencies
        run: pip install tox tox-uv
      - name: Run unit tests
        run: tox -e test-unit
        env:
          TRANSFORMERS_VERSION: ${{ matrix.transformers }}

  integration-tests:
    runs-on: ibm-wdc-k8s-vllm-h100-solo
    strategy:
      matrix:
        python: ["3.10", "3.13"]
        transformers: ["<5.0.0", ""]
        exclude:                                                                                                                                                                                                                                                                        
            - python: "3.13"                                                                                                                                                                                                                                                              
              transformers: "<5.0.0"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install dependencies
        run: pip install tox tox-uv
      - name: Run integration tests
        run: tox -e test-integration
        env:
          TRANSFORMERS_VERSION: ${{ matrix.transformers }}

  datagen-tests:
    runs-on: ibm-wdc-k8s-vllm-h100-solo
    strategy:
      matrix:
        python: ["3.10"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install dependencies
        run: pip install tox tox-uv
      - name: Run data generation tests
        run: tox -e test-datagen

  build:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    strategy:
      matrix:
        python: ["3.10"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install dependencies
        run: pip install tox tox-uv
      - name: Build the package
        run: |
          export SPECULATORS_BUILD_TYPE=dev
          export SPECULATORS_BUILD_ITERATION=${{ github.event.pull_request.number }}
          tox -e build
      - name: Upload build artifacts
        id: artifact-upload
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/*
          compression-level: 6
          if-no-files-found: error
          retention-days: 30
      - name: Find comment
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: Build Artifacts Available
      - name: Create or update comment
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            📦 **Build Artifacts Available**
            The build artifacts (\`.whl\` and \`.tar.gz\`) have been successfully generated and are available for download: ${{ steps.artifact-upload.outputs.artifact-url }}.
            They will be retained for **up to 30 days**.
            Commit: ${{ github.event.pull_request.head.sha }}
          edit-mode: replace
