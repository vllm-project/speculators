name: Main

on:
  push:
    branches:
      - main

env:
  UV_TORCH_BACKEND: "auto"
  HF_TOKEN: ${{ secrets.HF_RED_HAT_READ_ONLY }}

jobs:
  unit-tests:
    runs-on: ibm-wdc-k8s-vllm-h100-solo
    strategy:
      matrix:
        python: ["3.10", "3.13"]
        transformers: ["<5.0.0", ""] # empty string means latest version
        exclude:                                                                                                                                                                                                                                                                        
            - python: "3.13"                                                                                                                                                                                                                                                              
              transformers: "<5.0.0"
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-test-env
        with:
          python-version: ${{ matrix.python }}
          transformers-version: ${{ matrix.transformers }}
      - name: Run unit tests
        run: python -m pytest -ra tests/unit

  integration-tests:
    runs-on: ibm-wdc-k8s-vllm-h100-solo
    strategy:
      matrix:
        python: ["3.10", "3.13"]
        transformers: ["<5.0.0", ""]
        exclude:                                                                                                                                                                                                                                                                        
            - python: "3.13"                                                                                                                                                                                                                                                              
              transformers: "<5.0.0"
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-test-env
        with:
          python-version: ${{ matrix.python }}
          transformers-version: ${{ matrix.transformers }}
      - name: Run integration tests
        run: python -m pytest -ra tests/integration
